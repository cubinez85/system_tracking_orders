server {
    listen 80;
    server_name tracking-orders.cubinez.ru;

    # Базовая аутентификация для всего сайта (опционально)
    # Раскомментируйте следующие строки, если хотите закрыть весь сайт
    # auth_basic "Restricted Access";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # Локация для статических файлов (без аутентификации)
    location /static/ {
        alias /var/www/system_tracking_orders/static/;
        expires 30d;
        access_log off;
        # Отключаем аутентификацию для статики
        auth_basic off;
    }

    # Локация для медиа файлов (без аутентификации)
    location /media/ {
        alias /var/www/system_tracking_orders/media/;
        expires 30d;
        access_log off;
        # Отключаем аутентификацию для медиа
        auth_basic off;
    }

    # Пример: закрываем админку базовой аутентификацией Nginx
    location /admin/ {
        # Включаем базовую аутентификацию
        auth_basic "Admin Area - Authorization Required";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        # Прокси на Gunicorn
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Основная локация для API и остальных запросов
    location / {
        # Если хотите закрыть API базовой аутентификацией, раскомментируйте:
        #auth_basic "API Access";
        #auth_basic_user_file /etc/nginx/.htpasswd;
        
        # Прокси на Gunicorn
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Логи
    access_log /var/log/nginx/system_tracking_orders_access.log;
    error_log /var/log/nginx/system_tracking_orders_error.log;
}
